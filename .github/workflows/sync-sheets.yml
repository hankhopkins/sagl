name: Sync Google Sheets to Excel

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client openpyxl

      - name: Export Google Sheet to Excel and JSON
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: 1mHyeZtbtBPXL48kBAFak6fFHLYw3EeYnFd5lBYOa5EA
        run: python scripts/export_sheet.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/Stone_Arch_Golf_League_Data_2026.xlsx data.json
          git diff --staged --quiet || git commit -m "chore: sync Google Sheets data [skip ci]"
          git push
